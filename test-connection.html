<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostic Connexion Supabase - Taxi Proxi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #f5f0e8;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #FFD600;
      margin-bottom: 2rem;
    }
    .test-section {
      background: #111111;
      border: 1px solid #222222;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .test-item {
      margin-bottom: 1rem;
      padding: 1rem;
      background: #1a1a1a;
      border-left: 3px solid #888888;
      border-radius: 4px;
    }
    .test-item.success {
      border-left-color: #00E676;
      color: #00E676;
    }
    .test-item.error {
      border-left-color: #FF5252;
      color: #FF5252;
    }
    .test-item.info {
      border-left-color: #40C4FF;
      color: #40C4FF;
    }
    .label {
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    .value {
      word-break: break-all;
      font-size: 12px;
      margin-top: 0.5rem;
      background: #0a0a0a;
      padding: 0.5rem;
      border-radius: 4px;
    }
    button {
      background: #FFD600;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
      font-family: 'Outfit', sans-serif;
    }
    button:hover {
      background: #FFF176;
    }
  </style>
</head>
<body>
  <h1>🔍 Diagnostic Connexion Supabase</h1>
  
  <div class="test-section">
    <h2 style="color: #FFD600; margin-bottom: 1rem;">Tests de Connexion</h2>
    <div id="results"></div>
    <button onclick="runTests()">▶ Lancer les tests</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://uprhk9zcknjorj6-sm-eeac.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_upRhK9ZCkNbORj6-SM-EEA_CoKJif-l';

    function addResult(label, success, message = '', value = '') {
      const resultsDiv = document.getElementById('results');
      const testItem = document.createElement('div');
      testItem.className = `test-item ${success ? 'success' : (message.includes('ℹ') ? 'info' : 'error')}`;
      
      let html = `<div class="label">${success ? '✓' : '✗'} ${label}</div>`;
      if (message) html += `<div>${message}</div>`;
      if (value) html += `<div class="value">${value}</div>`;
      
      testItem.innerHTML = html;
      resultsDiv.appendChild(testItem);
    }

    async function runTests() {
      document.getElementById('results').innerHTML = '';
      
      // Test 1: Configuration
      addResult('Configuration', true, 'ℹ Clés Supabase trouvées', `URL: ${SUPABASE_URL}`);

      // Test 2: Supabase library loaded
      try {
        await new Promise(resolve => {
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
          script.onload = resolve;
          script.onerror = () => resolve('error');
          document.head.appendChild(script);
        });
        
        setTimeout(async () => {
          if (window.supabase) {
            addResult('Supabase Library', true, 'CDN chargé avec succès');
            
            // Test 3: Client initialization
            try {
              const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
              addResult('Client Supabase', true, 'Client créé avec succès');
              
              // Test 4: Database connection
              try {
                const { data, error } = await client
                  .from('drivers')
                  .select('count')
                  .limit(1);
                
                if (error) {
                  addResult('Connexion DB', false, `Erreur: ${error.message}`);
                } else {
                  addResult('Connexion DB', true, 'Connexion réussie!', 'Base de données accessible');
                  
                  // Test 5: Fetch drivers
                  try {
                    const { data: drivers, error: driversError } = await client
                      .from('drivers')
                      .select('*');
                    
                    if (driversError) {
                      addResult('Récupération Chauffeurs', false, `Erreur: ${driversError.message}`);
                    } else {
                      addResult('Récupération Chauffeurs', true, `✓ ${drivers?.length || 0} chauffeur(s) trouvé(s)`);
                      drivers?.forEach((driver, i) => {
                        addResult(`  Chauffeur ${i+1}`, true, `${driver.name} - ${driver.status}`, driver.email);
                      });
                    }
                  } catch (e) {
                    addResult('Récupération Chauffeurs', false, e.message);
                  }
                }
              } catch (e) {
                addResult('Connexion DB', false, e.message);
              }
            } catch (e) {
              addResult('Client Supabase', false, e.message);
            }
          } else {
            addResult('Supabase Library', false, 'CDN non chargé - Vérifiez votre connexion Internet');
          }
        }, 1000);
      } catch (e) {
        addResult('Supabase Library', false, 'Erreur de chargement CDN', e.message);
      }
    }

    // Auto-run on page load
    window.addEventListener('load', () => {
      setTimeout(runTests, 500);
    });
  </script>
</body>
</html>
