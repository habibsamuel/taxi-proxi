<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Base de Données - Taxi Proxi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #f5f0e8;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #FFD600;
      margin-bottom: 1rem;
    }
    h2 {
      color: #FFD600;
      font-size: 1.1em;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #333;
    }
    .test-section {
      background: #111111;
      border: 1px solid #222222;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .test-item {
      margin-bottom: 1rem;
      padding: 1rem;
      background: #1a1a1a;
      border-left: 3px solid #888888;
      border-radius: 4px;
    }
    .test-item.success {
      border-left-color: #00E676;
      color: #00E676;
    }
    .test-item.error {
      border-left-color: #FF5252;
      color: #FF5252;
    }
    .test-item.info {
      border-left-color: #40C4FF;
      color: #40C4FF;
    }
    .test-item.warning {
      border-left-color: #FFC400;
      color: #FFC400;
    }
    .label {
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    .message {
      margin-top: 0.3rem;
      font-size: 13px;
    }
    .value {
      word-break: break-all;
      font-size: 12px;
      margin-top: 0.5rem;
      background: #0a0a0a;
      padding: 0.5rem;
      border-radius: 4px;
      overflow-x: auto;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.5rem;
      font-size: 12px;
    }
    .data-table th {
      background: #222;
      color: #FFD600;
      padding: 0.5rem;
      text-align: left;
      border-bottom: 1px solid #444;
    }
    .data-table td {
      padding: 0.5rem;
      border-bottom: 1px solid #222;
    }
    .data-table tr:hover {
      background: #222;
    }
    button {
      background: #FFD600;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin: 0.5rem 0.5rem 0.5rem 0;
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s ease;
    }
    button:hover {
      background: #FFF176;
      transform: scale(1.05);
    }
    button:disabled {
      background: #888;
      cursor: not-allowed;
      opacity: 0.5;
    }
    button.secondary {
      background: #40C4FF;
      color: #000;
    }
    button.secondary:hover {
      background: #69D9FF;
    }
    button.danger {
      background: #FF5252;
      color: #fff;
    }
    button.danger:hover {
      background: #FF7777;
    }
    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 5px;
      border: 2px solid #FFD600;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .stat-box {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
    }
    .stat-number {
      font-size: 2em;
      color: #00E676;
      font-weight: bold;
    }
    .stat-label {
      font-size: 12px;
      color: #888;
      margin-top: 0.5rem;
    }
    .tab-buttons {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .tab-btn {
      padding: 8px 16px;
      background: #222;
      color: #fff;
      border: 1px solid #333;
      cursor: pointer;
      border-radius: 4px;
    }
    .tab-btn.active {
      background: #FFD600;
      color: #000;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <h1>🗄️ Gestion Base de Données - Taxi Proxi</h1>
  
  <div class="test-section">
    <h2>🚀 Contrôles</h2>
    <div class="tab-buttons">
      <button class="tab-btn active" onclick="switchTab('test')">🔍 Tests</button>
      <button class="tab-btn" onclick="switchTab('create')">➕ Créer Tables</button>
      <button class="tab-btn" onclick="switchTab('insert')">📝 Ajouter Données</button>
    </div>
  </div>

  <div class="test-section">
    <!-- TAB: Tests -->
    <div id="test" class="tab-content active">
      <h2>Tests de Connexion</h2>
      <button id="testBtn" onclick="runFullTests()">▶ Lancer test complet</button>
      <button class="secondary" onclick="document.getElementById('results').innerHTML = ''">🔄 Réinitialiser</button>
    </div>

    <!-- TAB: Create Tables -->
    <div id="create" class="tab-content">
      <h2>Créer les Tables</h2>
      <button id="createBtn" onclick="createAllTables()">➕ Créer toutes les tables</button>
      <button class="secondary" onclick="createTableByName()">➕ Créer table spécifique</button>
    </div>

    <!-- TAB: Insert Data -->
    <div id="insert" class="tab-content">
      <h2>Ajouter des Données</h2>
      <button id="insertBtn" onclick="insertSampleData()">📝 Insérer données d'exemple</button>
      <button class="secondary" onclick="document.getElementById('results').innerHTML = ''">🔄 Réinitialiser</button>
    </div>

    <div id="results"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.0"></script>
  <script>
    const SUPABASE_URL = 'https://uprhk9zcknjorj6-sm-eeac.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_upRhK9ZCkNbORj6-SM-EEA_CoKJif-l';
    const SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwcmhrOXpja25qb3JqNi1zbS1lZWFjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTcxNTczNDg2MCwiZXhwIjoxODczNTAwODYwfQ.bC7-qcNGZJBqCLJHdXIBn8cVhYvBr-5BpLWU5Z9Z1s4';

    let client = null;
    let adminClient = null;

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }

    function addResult(label, success, message = '', details = '') {
      const resultsDiv = document.getElementById('results');
      const testItem = document.createElement('div');
      
      let statusClass = 'error';
      let icon = '✗';
      
      if (success === true) {
        statusClass = 'success';
        icon = '✓';
      } else if (success === 'warning') {
        statusClass = 'warning';
        icon = '⚠';
      } else if (success === 'info') {
        statusClass = 'info';
        icon = 'ℹ';
      }
      
      testItem.className = `test-item ${statusClass}`;
      
      let html = `<div class="label">${icon} ${label}</div>`;
      if (message) html += `<div class="message">${message}</div>`;
      if (details) html += `<div class="value">${details}</div>`;
      
      testItem.innerHTML = html;
      resultsDiv.appendChild(testItem);
    }

    function createTable(columns, data) {
      let html = '<table class="data-table"><thead><tr>';
      columns.forEach(col => {
        html += `<th>${col}</th>`;
      });
      html += '</tr></thead><tbody>';
      
      data.forEach(row => {
        html += '<tr>';
        columns.forEach(col => {
          html += `<td>${row[col] !== null && row[col] !== undefined ? row[col] : 'N/A'}</td>`;
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    function initClients() {
      if (!window.supabase) {
        addResult('❌ Supabase', false, 'CDN non disponible');
        return false;
      }
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      adminClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);
      return true;
    }

    async function createAllTables() {
      document.getElementById('results').innerHTML = '';
      if (!initClients()) return;

      const createBtn = document.querySelector('#createBtn') || document.querySelector('button');
      createBtn.disabled = true;
      createBtn.innerHTML = '<span class="spinner"></span>Création en cours...';

      try {
        addResult('📋 Création des tables', 'info', 'Démarrage de la création...');

        // Table: drivers
        try {
          await adminClient.rpc('exec_sql', {
            sql: `
              CREATE TABLE IF NOT EXISTS drivers (
                id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                name VARCHAR(255) NOT NULL,
                email VARCHAR(255) UNIQUE NOT NULL,
                phone VARCHAR(20),
                status VARCHAR(50) DEFAULT 'available',
                vehicle_type VARCHAR(100),
                rating DECIMAL(3,2) DEFAULT 5.0,
                created_at TIMESTAMP DEFAULT NOW(),
                updated_at TIMESTAMP DEFAULT NOW()
              );
            `
          });
          addResult('✓ Table: drivers', true, 'Créée avec succès');
        } catch (e) {
          addResult('Table: drivers', 'warning', 'Création via RPC - Utilisez Supabase Dashboard');
        }

        // Table: riders
        try {
          await adminClient.rpc('exec_sql', {
            sql: `
              CREATE TABLE IF NOT EXISTS riders (
                id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                name VARCHAR(255) NOT NULL,
                email VARCHAR(255) UNIQUE NOT NULL,
                phone VARCHAR(20),
                rating DECIMAL(3,2) DEFAULT 5.0,
                created_at TIMESTAMP DEFAULT NOW(),
                updated_at TIMESTAMP DEFAULT NOW()
              );
            `
          });
          addResult('✓ Table: riders', true, 'Créée avec succès');
        } catch (e) {
          addResult('Table: riders', 'warning', 'Création via RPC');
        }

        // Table: trips
        try {
          await adminClient.rpc('exec_sql', {
            sql: `
              CREATE TABLE IF NOT EXISTS trips (
                id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                driver_id UUID REFERENCES drivers(id),
                rider_id UUID REFERENCES riders(id),
                pickup_location VARCHAR(255) NOT NULL,
                dropoff_location VARCHAR(255) NOT NULL,
                status VARCHAR(50) DEFAULT 'pending',
                distance DECIMAL(10,2),
                duration INT,
                fare DECIMAL(10,2),
                created_at TIMESTAMP DEFAULT NOW(),
                updated_at TIMESTAMP DEFAULT NOW()
              );
            `
          });
          addResult('✓ Table: trips', true, 'Créée avec succès');
        } catch (e) {
          addResult('Table: trips', 'warning', 'Création via RPC');
        }

        // Table: payments
        try {
          await adminClient.rpc('exec_sql', {
            sql: `
              CREATE TABLE IF NOT EXISTS payments (
                id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                trip_id UUID REFERENCES trips(id),
                amount DECIMAL(10,2) NOT NULL,
                payment_method VARCHAR(50),
                status VARCHAR(50) DEFAULT 'pending',
                created_at TIMESTAMP DEFAULT NOW(),
                updated_at TIMESTAMP DEFAULT NOW()
              );
            `
          });
          addResult('✓ Table: payments', true, 'Créée avec succès');
        } catch (e) {
          addResult('Table: payments', 'warning', 'Création via RPC');
        }

        addResult('⚠️ Info Important', 'warning', 'Les tables doivent être créées via Supabase Dashboard', 
          'Allez dans Supabase → SQL Editor et créez les tables manuellement avec les schémas ci-dessus');

      } catch (error) {
        addResult('❌ Erreur', false, error.message);
      } finally {
        createBtn.disabled = false;
        createBtn.innerHTML = '➕ Créer toutes les tables';
      }
    }

    async function insertSampleData() {
      document.getElementById('results').innerHTML = '';
      if (!initClients()) return;

      const insertBtn = document.querySelector('#insertBtn') || document.querySelector('button');
      insertBtn.disabled = true;
      insertBtn.innerHTML = '<span class="spinner"></span>Insertion en cours...';

      try {
        addResult('📝 Insertion données d\'exemple', 'info', 'Démarrage...');

        // Insert drivers
        const { data: driversData, error: driversError } = await client
          .from('drivers')
          .insert([
            { name: 'Ahmed Hassan', email: 'ahmed@taxi.com', phone: '+237600000001', status: 'available', vehicle_type: 'Sedan' },
            { name: 'Marie Dupont', email: 'marie@taxi.com', phone: '+237600000002', status: 'available', vehicle_type: 'SUV' },
            { name: 'Jean Paul', email: 'jean@taxi.com', phone: '+237600000003', status: 'busy', vehicle_type: 'Sedan' }
          ]);
        
        if (driversError) {
          addResult('Drivers', 'warning', driversError.message);
        } else {
          addResult('✓ Drivers', true, '3 chauffeurs ajoutés');
        }

        // Insert riders
        const { data: ridersData, error: ridersError } = await client
          .from('riders')
          .insert([
            { name: 'Alice Martin', email: 'alice@gmail.com', phone: '+237600000011' },
            { name: 'Bob Wilson', email: 'bob@gmail.com', phone: '+237600000012' },
            { name: 'Claire Brown', email: 'claire@gmail.com', phone: '+237600000013' }
          ]);
        
        if (ridersError) {
          addResult('Riders', 'warning', ridersError.message);
        } else {
          addResult('✓ Riders', true, '3 passagers ajoutés');
        }

        addResult('✓ Insertion Terminée', true, 'Données d\'exemple ajoutées avec succès');

      } catch (error) {
        addResult('❌ Erreur', false, error.message);
      } finally {
        insertBtn.disabled = false;
        insertBtn.innerHTML = '📝 Insérer données d\'exemple';
      }
    }

    async function testTable(tableName) {
      try {
        const { data, error, status } = await client
          .from(tableName)
          .select('*')
          .limit(1);
        
        if (error) {
          if (error.code === '42P01') {
            addResult(`❌ ${tableName}`, false, `N'existe pas - Créez la table d'abord`);
            return false;
          } else {
            addResult(`⚠️ ${tableName}`, 'warning', error.message);
            return false;
          }
        }

        const { count } = await client
          .from(tableName)
          .select('*', { count: 'exact', head: true });

        const { data: allData } = await client.from(tableName).select('*');

        addResult(`✓ ${tableName}`, true, `${count || 0} ligne(s)`, 
          allData && allData.length > 0 ? createTable(Object.keys(allData[0]), allData.slice(0, 5)) : 'Table vide'
        );

        return true;
      } catch (e) {
        addResult(`❌ ${tableName}`, false, e.message);
        return false;
      }
    }

    async function runFullTests() {
      document.getElementById('results').innerHTML = '';
      const testBtn = document.querySelector('#testBtn') || document.querySelector('button');
      testBtn.disabled = true;
      testBtn.innerHTML = '<span class="spinner"></span>Tests en cours...';

      try {
        if (!initClients()) return;

        addResult('✓ Configuration', true, 'Clés Supabase chargées');
        addResult('✓ Supabase Library', true, 'CDN chargé');

        const tables = ['drivers', 'riders', 'trips', 'payments'];
        let successCount = 0;

        for (const table of tables) {
          if (await testTable(table)) successCount++;
        }

        const summaryDiv = document.createElement('div');
        summaryDiv.className = 'test-item success';
        summaryDiv.innerHTML = `
          <div class="label">✓ Diagnostic Terminé</div>
          <div class="stats">
            <div class="stat-box">
              <div class="stat-number">${successCount}/${tables.length}</div>
              <div class="stat-label">Tables OK</div>
            </div>
          </div>
        `;
        document.getElementById('results').appendChild(summaryDiv);

      } catch (error) {
        addResult('❌ Erreur', false, error.message);
      } finally {
        testBtn.disabled = false;
        testBtn.innerHTML = '▶ Lancer test complet';
      }
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        addResult('🚀 Bienvenue', 'info', 'Sélectionnez une action');
      }, 500);
    });
  </script>
</body>
</html>
