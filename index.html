<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taxi Proxi — Covoiturage Cameroun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  
  <!-- SUPABASE CLIENT -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>

  <style>
:root {
  --bg:      #0a0a0a;
  --bg2:     #111111;
  --bg3:     #1a1a1a;
  --border:  #222222;
  --border2: #2e2e2e;
  --text:    #f5f0e8;
  --text2:   #888888;
  --text3:   #444444;
  --yellow:  #FFD600;
  --yellow2: #FFF176;
  --green:   #00E676;
  --red:     #FF5252;
  --orange:  #FF9100;
  --blue:    #40C4FF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;line-height:1.5}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;animation:splashOut 0.5s 2s forwards}
@keyframes splashOut{to{opacity:0;pointer-events:none}}
.splash-icon{font-size:64px;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.splash-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--yellow);letter-spacing:-0.02em}
.splash-sub{color:var(--text2);font-size:14px}
.splash-bar{width:160px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:1rem}
.splash-fill{height:100%;background:var(--yellow);border-radius:2px;animation:load 1.8s ease forwards}
@keyframes load{from{width:0}to{width:100%}}

/* APP */
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

/* HEADER */
.app-header{padding:1rem 1.25rem 0.75rem;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--yellow);display:flex;align-items:center;gap:8px}
.app-logo span{color:var(--text);font-weight:400;font-size:14px}
.header-right{display:flex;align-items:center;gap:10px}
.user-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:100px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .2s}
.user-badge.logged{border-color:var(--yellow);color:var(--yellow)}
.user-badge:hover{border-color:var(--text2)}

/* CONTENT */
.app-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* BOTTOM NAV */
.bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.nav-btn{flex:1;padding:10px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;transition:color .2s;font-family:'Outfit',sans-serif}
.nav-btn .nav-icon{font-size:20px}
.nav-btn .nav-label{font-size:10px;letter-spacing:0.05em}
.nav-btn.active{color:var(--yellow)}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 6px rgba(255,214,0,0.6))}

/* TABS */
.tab{display:none;padding:1.25rem}
.tab.active{display:block}

/* STATS BAND */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--yellow)}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:2px;letter-spacing:0.04em}

/* SEARCH */
.search-bar{position:relative;margin-bottom:10px}
.search-bar input{width:100%;padding:12px 16px 12px 42px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border .2s}
.search-bar input:focus{border-color:var(--yellow)}
.search-bar input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}

/* TRAJET CARD */
.trajet-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:10px;transition:border-color .2s}
.trajet-card:hover{border-color:var(--border2)}
.trajet-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.trajet-driver{display:flex;align-items:center;gap:10px}
.driver-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--yellow),var(--orange));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#000}
.driver-name{font-weight:600;font-size:14px}
.driver-car{font-size:11px;color:var(--text2);margin-top:1px}
.trajet-badge{padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600}
.badge-green{background:rgba(0,230,118,0.15);color:var(--green);border:1px solid rgba(0,230,118,0.3)}
.badge-red{background:rgba(255,82,82,0.15);color:var(--red);border:1px solid rgba(255,82,82,0.3)}
.trajet-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.meta-chip{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);background:var(--bg3);padding:4px 8px;border-radius:6px}
.meta-chip span{font-size:13px}
.trajet-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none;border-radius:8px;padding:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-wa:hover{opacity:0.88}
.btn-call{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:10px;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.btn-call:hover{border-color:var(--blue);color:var(--blue)}

/* EMPTY STATE */
.empty{text-align:center;padding:3rem 1rem;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:1rem;opacity:.5}
.empty p{font-size:13px;line-height:1.7}

/* FORM */
.form-section{margin-bottom:1.5rem}
.form-label{font-size:12px;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;display:block}
.form-input{width:100%;padding:13px 16px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;outline:none;transition:border .2s}
.form-input:focus{border-color:var(--yellow)}
.form-input::placeholder{color:var(--text3)}
.btn-submit{width:100%;padding:15px;background:var(--yellow);color:#000;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;transition:all .2s}
.btn-submit:hover{background:var(--yellow2);transform:translateY(-1px)}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:100px;padding:10px 20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:1000}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}
#toast.info{border-color:var(--yellow);color:var(--yellow)}

/* LOADING */
.loading-spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border2);border-top-color:var(--yellow);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:1.25rem 0}
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-icon">🚕</div>
  <div class="splash-title">Taxi Proxi</div>
  <div class="splash-sub">Covoiturage urbain Cameroun</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- APP -->
<div id="app">
  <!-- Header -->
  <div class="app-header">
    <div class="app-logo">🚕 <span>Taxi Proxi</span></div>
    <div class="header-right">
      <div class="user-badge" id="userBadge" onclick="goAccount()">Connexion</div>
    </div>
  </div>

  <!-- Content -->
  <div class="app-content">

    <!-- TAB TROUVER (HOME) -->
    <div class="tab active" id="tab-find">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="statTrajets">0</div><div class="stat-lbl">Chauffeurs</div></div>
        <div class="stat-card"><div class="stat-num" id="statOnline">0</div><div class="stat-lbl">En ligne</div></div>
        <div class="stat-card"><div class="stat-num" id="statOffline">0</div><div class="stat-lbl">Hors ligne</div></div>
      </div>

      <div id="trajetsList" style="min-height: 200px;">
        <div class="empty">
          <div class="loading-spinner"></div>
          <p>Chargement des chauffeurs...</p>
        </div>
      </div>
    </div>

    <!-- TAB AJOUTER CHAUFFEUR -->
    <div class="tab" id="tab-offer">
      <div class="section-head" style="margin-bottom:1rem">
        <h2 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px">Ajouter un chauffeur</h2>
        <p style="font-size:13px;color:var(--text2)">Enregistrez un nouveau chauffeur dans la base de données</p>
      </div>

      <div class="form-section">
        <label class="form-label">Nom complet</label>
        <input class="form-input" id="driverName" placeholder="Ex: Jean-Paul M.">
      </div>
      <div class="form-section">
        <label class="form-label">Email</label>
        <input class="form-input" id="driverEmail" type="email" placeholder="Ex: jean@taxi.cm">
      </div>
      <div class="form-section">
        <label class="form-label">Téléphone</label>
        <input class="form-input" id="driverPhone" placeholder="Ex: 694000001">
      </div>
      <div class="form-section">
        <label class="form-label">Plaque immatriculation</label>
        <input class="form-input" id="driverPlate" placeholder="Ex: CM-001-ABC">
      </div>
      <div class="form-section">
        <label class="form-label">Type de véhicule</label>
        <select class="form-input" id="driverType" style="cursor:pointer">
          <option>Sedan</option>
          <option>SUV</option>
          <option>Minibus</option>
          <option>Berline</option>
        </select>
      </div>
      <div class="form-section">
        <label class="form-label">Statut</label>
        <select class="form-input" id="driverStatus" style="cursor:pointer">
          <option>offline</option>
          <option>online</option>
          <option>busy</option>
        </select>
      </div>
      <button class="btn-submit" onclick="registerDriver()" id="btnRegister">🚕 Enregistrer le chauffeur</button>
    </div>

    <!-- TAB COMPTE -->
    <div class="tab" id="tab-account">
      <div class="empty" style="padding:3rem 1rem">
        <div class="empty-icon">👤</div>
        <p>Connectez-vous pour voir votre profil</p>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('find',this)">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Accueil</span>
    </button>
    <button class="nav-btn" onclick="switchTab('offer',this)">
      <span class="nav-icon">➕</span>
      <span class="nav-label">Ajouter</span>
    </button>
    <button class="nav-btn" onclick="switchTab('account',this)">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Compte</span>
    </button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════════
//  GLOBAL STATE
// ════════════════════════════════════════════
let allDrivers = [];
let realTimeSubscription = null;

// ════════════════════════════════════════════
//  TOAST NOTIFICATIONS
// ════════════════════════════════════════════
let toastTimer;
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ════════════════════════════════════════════
//  TAB SWITCHING
// ════════════════════════════════════════════
function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (btn) btn.classList.add('active');
}

function goAccount() {
  switchTab('account', document.querySelectorAll('.nav-btn')[2]);
}

// ════════════════════════════════════════════
//  LOAD DRIVERS FROM SUPABASE
// ════════════════════════════════════════════
async function loadDrivers() {
  const result = await getAllDrivers();
  
  if (!result.success) {
    showToast('Erreur: ' + result.error, 'error');
    renderEmptyDrivers();
    return;
  }

  allDrivers = result.data || [];
  renderDrivers();
  updateStats();
}

// ════════════════════════════════════════════
//  UPDATE STATISTICS
// ════════════════════════════════════════════
function updateStats() {
  const total = allDrivers.length;
  const online = allDrivers.filter(d => d.status === 'online').length;
  const offline = allDrivers.filter(d => d.status === 'offline').length;
  
  document.getElementById('statTrajets').textContent = total;
  document.getElementById('statOnline').textContent = online;
  document.getElementById('statOffline').textContent = offline;
}

// ════════════════════════════════════════════
//  RENDER DRIVERS LIST
// ════════════════════════════════════════════
function renderDrivers() {
  const el = document.getElementById('trajetsList');
  
  if (!allDrivers.length) {
    renderEmptyDrivers();
    return;
  }

  el.innerHTML = allDrivers.map(driver => {
    const isOnline = driver.status === 'online';
    const badge = isOnline ? '✓ En ligne' : '✗ Hors ligne';
    const badgeClass = isOnline ? 'badge-green' : 'badge-red';
    
    return `
      <div class="trajet-card">
        <div class="trajet-top">
          <div class="trajet-driver">
            <div class="driver-avatar">${driver.name.charAt(0).toUpperCase()}</div>
            <div>
              <div class="driver-name">${driver.name}</div>
              <div class="driver-car">${driver.vehicle_type} • ${driver.vehicle_plate}</div>
            </div>
          </div>
          <span class="trajet-badge ${badgeClass}">${badge}</span>
        </div>
        
        <div class="trajet-meta">
          <div class="meta-chip"><span>⭐</span> ${driver.rating || 4.5}</div>
          <div class="meta-chip"><span>🚗</span> ${driver.total_trips || 0} trajets</div>
          <div class="meta-chip"><span>📧</span> ${driver.email}</div>
        </div>
        
        <div class="trajet-actions">
          <button class="btn-wa" onclick="contactWA('${driver.phone}')">
            💬 WhatsApp
          </button>
          <button class="btn-call" onclick="callDriver('${driver.phone}')">
            📞 Appeler
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function renderEmptyDrivers() {
  const el = document.getElementById('trajetsList');
  el.innerHTML = `
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <p>Aucun chauffeur disponible<br>pour le moment.</p>
    </div>
  `;
}

// ════════════════════════════════════════════
//  REGISTER NEW DRIVER
// ════════════════════════════════════════════
async function registerDriver() {
  const name = document.getElementById('driverName').value.trim();
  const email = document.getElementById('driverEmail').value.trim();
  const phone = document.getElementById('driverPhone').value.trim();
  const plate = document.getElementById('driverPlate').value.trim();
  const type = document.getElementById('driverType').value;
  const status = document.getElementById('driverStatus').value;

  if (!name || !email || !phone || !plate) {
    showToast('Veuillez remplir tous les champs', 'error');
    return;
  }

  const btn = document.getElementById('btnRegister');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> Enregistrement...';

  const result = await addDriver({
    name,
    email,
    phone,
    vehicle_plate: plate,
    vehicle_type: type,
    status,
    rating: 4.5,
    total_trips: 0
  });

  btn.disabled = false;
  btn.innerHTML = '🚕 Enregistrer le chauffeur';

  if (result.success) {
    // Réinitialiser le formulaire
    document.getElementById('driverName').value = '';
    document.getElementById('driverEmail').value = '';
    document.getElementById('driverPhone').value = '';
    document.getElementById('driverPlate').value = '';
    document.getElementById('driverType').value = 'Sedan';
    document.getElementById('driverStatus').value = 'offline';
    
    showToast('✓ Chauffeur enregistré avec succès!', 'success');
    loadDrivers();
  } else {
    showToast('Erreur: ' + result.error, 'error');
  }
}

// ════════════════════════════════════════════
//  CONTACT FUNCTIONS
// ════════════════════════════════════════════
function contactWA(phone) {
  const msg = encodeURIComponent('Bonjour ! Je vous contacte via Taxi Proxi. Êtes-vous disponible ?');
  window.open(`https://wa.me/237${phone}?text=${msg}`, '_blank');
}

function callDriver(phone) {
  window.location.href = `tel:+237${phone}`;
}

// ════════════════════════════════════════════
//  REAL-TIME SUBSCRIPTION
// ════════════════════════════════════════════
function setupRealtimeSubscription() {
  realTimeSubscription = subscribeToDrivers((payload) => {
    console.log('Changement détecté:', payload.eventType);
    loadDrivers();
  });
}

// ════════════════════════════════════════════
//  INITIALIZATION
// ════════════════════════════════════════════
window.addEventListener('load', async () => {
  setTimeout(async () => {
    document.getElementById('splash').style.display = 'none';
    
    // Charger les chauffeurs depuis Supabase
    await loadDrivers();
    
    // S'abonner aux changements en temps réel
    setupRealtimeSubscription();
    
    showToast('✓ Connecté à Supabase', 'success');
  }, 2200);
});

// Nettoyage au déchargement
window.addEventListener('unload', () => {
  if (realTimeSubscription) {
    unsubscribeFromDrivers(realTimeSubscription);
  }
});
</script>

</body>
</html>
